# Grafana server headless service
apiVersion: v1
kind: Service

metadata:
  name: server-grafana
  annotations:
    prometheus.io/scrape: 'true'
    prometheus.io/port:   '3000'
spec:
  type: ClusterIP
  clusterIP: None
  ports:
  - name: server
    port: 3000
    targetPort: server
    protocol: TCP