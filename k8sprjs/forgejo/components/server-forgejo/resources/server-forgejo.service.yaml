# Forgejo server headless service
apiVersion: v1
kind: Service

metadata:
  name: server-forgejo
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/path: /metrics
    prometheus.io/port: "3000"
spec:
  type: ClusterIP
  clusterIP: None
  ports:
  - port: 3000
    targetPort: server
    protocol: TCP
    name: server
  - port: 22
    targetPort: ssh
    protocol: TCP
    name: ssh